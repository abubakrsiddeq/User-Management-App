<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UserBase — Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="min-h-screen bg-[#0a0a0f] text-white font-mono">

  <!-- Noise Overlay -->
  <div class="noise-overlay"></div>

  <!-- Header -->
  <header class="relative z-10 border-b border-white/10 px-6 py-5">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-8 h-8 rounded-lg bg-[#c8ff00] flex items-center justify-center">
          <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </div>
        <div>
          <h1 class="font-display text-xl font-extrabold tracking-tight text-white leading-none">UserBase</h1>
          <p class="text-xs text-white/30 font-mono mt-0.5">Management System</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div id="userCount" class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full border border-white/10 text-xs text-white/50">
          <span class="w-1.5 h-1.5 rounded-full bg-[#c8ff00] animate-pulse"></span>
          <span id="countText">0 users</span>
        </div>
        <button id="openAddModal" class="flex items-center gap-2 px-4 py-2 bg-[#c8ff00] text-black text-sm font-semibold rounded-lg hover:bg-[#d4ff33] transition-all hover:scale-105 active:scale-95">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
          </svg>
          Add User
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="relative z-10 max-w-7xl mx-auto px-6 py-8">

    <!-- Search + Stats Bar -->
    <div class="flex flex-col sm:flex-row gap-4 mb-8">
      <div class="relative flex-1">
        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input id="searchInput" type="text" placeholder="Search users by name, email..." 
          class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl text-sm text-white placeholder-white/25 focus:outline-none focus:border-[#c8ff00]/50 focus:bg-white/[0.08] transition-all font-mono"/>
      </div>
      <button id="searchBtn" class="px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-sm text-white/70 hover:bg-white/10 hover:text-white transition-all font-mono">
        Search
      </button>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Loading Spinner -->
    <div id="loadingState" class="flex flex-col items-center justify-center py-24 gap-4">
      <div class="spinner"></div>
      <p class="text-white/30 text-sm font-mono">Fetching users...</p>
    </div>

    <!-- Error State -->
    <div id="errorState" class="hidden flex-col items-center justify-center py-24 gap-4">
      <div class="w-12 h-12 rounded-full bg-red-500/10 flex items-center justify-center">
        <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <p class="text-white/50 text-sm font-mono" id="errorMsg">Failed to load users.</p>
      <button onclick="loadUsers()" class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-all">Retry</button>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden flex-col items-center justify-center py-24 gap-4">
      <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center">
        <svg class="w-6 h-6 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <p class="text-white/30 text-sm font-mono">No users found.</p>
    </div>

    <!-- Table -->
    <div id="tableContainer" class="hidden">
      <div class="rounded-xl border border-white/10 overflow-hidden bg-white/[0.02]">
        <!-- Table Header -->
        <div class="table-header grid grid-cols-12 px-5 py-3 bg-white/5 border-b border-white/10 text-xs text-white/40 uppercase tracking-widest font-mono">
          <div class="col-span-1">ID</div>
          <div class="col-span-2">First</div>
          <div class="col-span-2">Last</div>
          <div class="col-span-3">Email</div>
          <div class="col-span-2">Phone</div>
          <div class="col-span-2 text-right">Actions</div>
        </div>
        <!-- Table Body -->
        <div id="userTableBody" class="divide-y divide-white/5"></div>
      </div>
    </div>

  </main>

  <!-- ── ADD USER MODAL ── -->
  <div id="addModal" class="modal-overlay hidden fixed inset-0 z-40 flex items-center justify-center p-4">
    <div class="modal-backdrop absolute inset-0 bg-black/70 backdrop-blur-sm" id="addModalBackdrop"></div>
    <div class="modal-box relative z-10 w-full max-w-md bg-[#111118] border border-white/15 rounded-2xl p-6 shadow-2xl">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="font-display text-lg font-bold text-white">Add New User</h2>
          <p class="text-xs text-white/30 mt-0.5 font-mono">Fill in the details below</p>
        </div>
        <button id="closeAddModal" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 text-white/50 hover:text-white transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="addForm" class="flex flex-col gap-4">
        <div class="grid grid-cols-2 gap-3">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" id="addFirstName" class="form-input" placeholder="Ali" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" id="addLastName" class="form-input" placeholder="Khan" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="addEmail" class="form-input" placeholder="ali@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" id="addPhone" class="form-input" placeholder="+92 300 1234567" required/>
        </div>
        <div class="flex gap-3 mt-2">
          <button type="button" id="cancelAdd" class="flex-1 py-2.5 rounded-lg border border-white/10 text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all font-mono">Cancel</button>
          <button type="submit" id="addSubmitBtn" class="flex-1 py-2.5 rounded-lg bg-[#c8ff00] text-black text-sm font-semibold hover:bg-[#d4ff33] transition-all hover:scale-[1.02] active:scale-[0.98]">
            <span id="addBtnText">Create User</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── EDIT USER MODAL ── -->
  <div id="editModal" class="modal-overlay hidden fixed inset-0 z-40 flex items-center justify-center p-4">
    <div class="modal-backdrop absolute inset-0 bg-black/70 backdrop-blur-sm" id="editModalBackdrop"></div>
    <div class="modal-box relative z-10 w-full max-w-md bg-[#111118] border border-white/15 rounded-2xl p-6 shadow-2xl">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="font-display text-lg font-bold text-white">Edit User</h2>
          <p class="text-xs text-white/30 mt-0.5 font-mono">Update user details</p>
        </div>
        <button id="closeEditModal" class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/5 hover:bg-white/10 text-white/50 hover:text-white transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="editForm" class="flex flex-col gap-4">
        <input type="hidden" id="editUserId"/>
        <div class="grid grid-cols-2 gap-3">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" id="editFirstName" class="form-input" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" id="editLastName" class="form-input" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="editEmail" class="form-input" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" id="editPhone" class="form-input" required/>
        </div>
        <div class="flex gap-3 mt-2">
          <button type="button" id="cancelEdit" class="flex-1 py-2.5 rounded-lg border border-white/10 text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all font-mono">Cancel</button>
          <button type="submit" id="editSubmitBtn" class="flex-1 py-2.5 rounded-lg bg-blue-500 text-white text-sm font-semibold hover:bg-blue-400 transition-all hover:scale-[1.02] active:scale-[0.98]">
            <span id="editBtnText">Save Changes</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── DELETE CONFIRM MODAL ── -->
  <div id="deleteModal" class="modal-overlay hidden fixed inset-0 z-40 flex items-center justify-center p-4">
    <div class="modal-backdrop absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
    <div class="modal-box relative z-10 w-full max-w-sm bg-[#111118] border border-white/15 rounded-2xl p-6 shadow-2xl text-center">
      <div class="w-12 h-12 rounded-full bg-red-500/10 border border-red-500/20 flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </div>
      <h3 class="font-display text-base font-bold text-white mb-1">Delete User?</h3>
      <p class="text-sm text-white/40 font-mono mb-6" id="deleteUserName">This action cannot be undone.</p>
      <input type="hidden" id="deleteUserId"/>
      <div class="flex gap-3">
        <button id="cancelDelete" class="flex-1 py-2.5 rounded-lg border border-white/10 text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all font-mono">Cancel</button>
        <button id="confirmDelete" class="flex-1 py-2.5 rounded-lg bg-red-500 text-white text-sm font-semibold hover:bg-red-400 transition-all">
          <span id="deleteBtnText">Delete</span>
        </button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
